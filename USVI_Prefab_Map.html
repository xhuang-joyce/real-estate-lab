<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USVI Prefab Supplier Map — HIGH Priority Factories → Ports → JFL Hospital (St. Croix)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
  #map { height: 100vh; width: 100%; }
  .legend { background: white; padding: 10px 14px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.15); font-size: 13px; line-height: 1.7; max-width: 290px; }
  .legend h4 { margin: 0 0 6px; font-size: 14px; }
  .legend .sw { display: inline-block; width: 14px; height: 14px; margin-right: 6px; vertical-align: middle; border-radius: 50%; }
  .legend .line { display: inline-block; width: 24px; height: 0; border-top: 3px solid #333; margin-right: 6px; vertical-align: middle; }
  .legend .line.dashed { border-top: 3px dashed #0a66c2; }
  .legend .trade-icon { display: inline-flex; width: 22px; height: 22px; border-radius: 50%; background: #1F3864; color: white; align-items: center; justify-content: center; font-size: 11px; margin-right: 6px; vertical-align: middle; }
  .trade-marker { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 50%; border: 2.5px solid white; box-shadow: 0 2px 6px rgba(0,0,0,.35); color: white; font-size: 16px; }
  .popup h3 { margin: 0 0 4px; font-size: 14px; }
  .popup .meta { font-size: 12px; color: #555; margin-bottom: 4px; }
  .popup .feas { display: inline-block; padding: 1px 6px; border-radius: 3px; color: white; font-size: 11px; font-weight: 600; }
  .popup a { color: #0a66c2; text-decoration: none; }
  .popup a:hover { text-decoration: underline; }
  .title-banner { position: absolute; top: 12px; left: 60px; background: white; padding: 8px 14px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.15); font-size: 14px; font-weight: 600; z-index: 1000; }
</style>
</head>
<body>
<div id="map"></div>
<div class="title-banner">USVI Prefab Supplier Map — HIGH Priority Factories → US Port → San Juan → JFL Hospital (St. Croix)</div>
<script>
// ---- Trade category icon mapping (Font Awesome) ----
const tradeIcon = {
  "Bathroom Pods":            "fa-solid fa-bath",
  "MEP Racks / Risers":       "fa-solid fa-plug",
  "Patient Headwalls":        "fa-solid fa-hospital",
  "OR / Clean Room Ceilings": "fa-solid fa-layer-group"
};

// ---- HIGH priority factories only ----
// Primary routing: East origins → Port of Palm Beach (Tropical Shipping, DIRECT to STX, 3-day ocean)
//                   West/SW origins → Port of Houston (Crowley, via SJU/DR feeder, 5-7 day ocean)
// Alt: Jacksonville (TOTE, US-flag, via SJU transship) — for compliance-driven lanes
const factories = [
  // Bathroom Pods
  { name: "SurePods (Orlando)",        lat: 28.5383, lon: -81.3792, category: "Bathroom Pods", feas: "HIGH",     address: "Orlando, FL (main US factory)",                     port: "Port of Palm Beach", portLat: 26.7683, portLon: -80.0534, source: "https://www.surepods.com/knowledge-center/driving-innovation-in-healthcare" },
  { name: "SurePods (Phoenix)",        lat: 33.4484, lon: -112.0740, category: "Bathroom Pods", feas: "MED-LOW", address: "Phoenix, AZ ('SurePods West')",                     port: "Houston",            portLat: 29.7247, portLon: -95.0114, source: "https://www.prweb.com/releases/surepods-heads-west-with-new-facility-expands-prefabricated-bathroom-pod-production-capacity-858186794.html" },
  { name: "BLOX",                      lat: 33.4018, lon: -86.9542,  category: "Bathroom Pods", feas: "MED-HIGH", address: "2625 5th Ave N, Bessemer, AL 35020",                port: "Port of Palm Beach", portLat: 26.7683, portLon: -80.0534, source: "https://www.chamberofcommerce.com/business-directory/alabama/bessemer/manufacturer/2004017181-blox" },
  // MEP Racks / Risers
  { name: "Fluid Cooling Systems",     lat: 42.9634, lon: -83.6802,  category: "MEP Racks / Risers", feas: "MED",     address: "4047 Market Place, Flint, MI 48507",            port: "Port of Palm Beach", portLat: 26.7683, portLon: -80.0534, source: "https://www.fluidcoolingsystems.com/contact-us/" },
  { name: "EIG (Surprise AZ mfg)",     lat: 33.6292, lon: -112.3680, category: "MEP Racks / Risers", feas: "MED-LOW", address: "Surprise, AZ (manufacturing)",                 port: "Houston",            portLat: 29.7247, portLon: -95.0114, source: "https://www.eigllc.com/careers" },
  { name: "EIG HQ (Redwood City)",     lat: 37.4852, lon: -122.2364, category: "MEP Racks / Risers", feas: "MED-LOW", address: "Redwood City, CA (HQ)",                        port: "Houston",            portLat: 29.7247, portLon: -95.0114, source: "https://www.eigllc.com/about-us" },
  { name: "Epsilon Industries (TX)",   lat: 29.7604, lon: -95.3698,  category: "MEP Racks / Risers", feas: "MED",     address: "Texas (exact not public)",                     port: "Houston",            portLat: 29.7247, portLon: -95.0114, source: "https://epsilonfab.com/" },
  // Patient Headwalls
  { name: "DIRTT (Savannah)",          lat: 32.0835, lon: -81.0998,  category: "Patient Headwalls", feas: "HIGH",     address: "Savannah, GA (highest-producing DIRTT plant)", port: "Port of Palm Beach", portLat: 26.7683, portLon: -80.0534, source: "https://www.selectgeorgia.com/blog/success-stories/dirtt/" },
  { name: "DIRTT (Phoenix)",           lat: 33.4484, lon: -112.0740, category: "Patient Headwalls", feas: "MED-LOW", address: "Phoenix, AZ (72,000 sq ft)",                    port: "Houston",            portLat: 29.7247, portLon: -95.0114, source: "https://mcshaneconstruction.com/portfolio/dirtt-environmental-solutions/" },
  { name: "DIRTT (Calgary HQ)",        lat: 51.0447, lon: -114.0719, category: "Patient Headwalls", feas: "LOW",      address: "7303 30 Street SE, Calgary, AB T2C 1N6",        port: "Port of Palm Beach", portLat: 26.7683, portLon: -80.0534, source: "https://www.dnb.com/business-directory/company-profiles.dirtt_environmental_solutions_ltd.23577a5c38e2937c6a0d35efe53e3dde.html" },
  { name: "Amico (Burlington ON)",     lat: 43.3255, lon: -79.7990,  category: "Patient Headwalls", feas: "MED",      address: "1080 Corporate Drive, Burlington, ON L7L 5R6",  port: "Port of Palm Beach", portLat: 26.7683, portLon: -80.0534, source: "https://amicoglobal.com/manufacturing/" },
  { name: "Amico (Richmond Hill HQ)",  lat: 43.8828, lon: -79.4403,  category: "Patient Headwalls", feas: "MED",      address: "85 Fulton Way, Richmond Hill, ON L4B 2N4",      port: "Port of Palm Beach", portLat: 26.7683, portLon: -80.0534, source: "https://amicoglobal.com/manufacturing/" },
  { name: "Modular Services Co.",      lat: 35.5729, lon: -97.5127,  category: "Patient Headwalls", feas: "MED",      address: "500 E. Britton Rd, Oklahoma City, OK 73114",    port: "Houston",            portLat: 29.7247, portLon: -95.0114, source: "https://www.yellowpages.com/oklahoma-city-ok/mip/modular-services-company-463703869" },
  // OR / Clean Room Ceilings
  { name: "Synergy Med",               lat: 39.7394, lon: -105.1586, category: "OR / Clean Room Ceilings", feas: "MED", address: "14143 Denver West Pkwy #100, Golden, CO 80401", port: "Houston",          portLat: 29.7247, portLon: -95.0114, source: "https://www.cbinsights.com/company/synergy-med-global-design-solutions" }
];

// ---- US mainland ports ----
const ports = [
  { name: "Port of Palm Beach (Riviera Beach, FL)", lat: 26.7683, lon: -80.0534, color: "#0a66c2", note: "PRIMARY US gateway to St. Croix — Tropical Shipping DIRECT service (3-day ocean, no SJU transship). Tropical holds a 25-yr lease at the Wilfred 'Bomba' Allick Port on St. Croix (signed 2024). Foreign-flag legal under USVI Jones Act exemption." },
  { name: "Jacksonville Port",           lat: 30.3322, lon: -81.6557, color: "#1976d2", note: "US-flag alternative — TOTE Maritime Jax → San Juan (2–3 days), then feeder to St. Croix (+2–3 days). Useful when cargo must move on US-flag vessels or shipper has existing TOTE contracts." },
  { name: "Port of Houston",             lat: 29.7247, lon: -95.0114, color: "#0a66c2", note: "Gulf gateway for West/Southwest factories — Crowley Gulf-Caribbean service. Note: Crowley to STX also transships via San Juan / Rio Haina (DR). No direct Houston→STX liner service." },
  { name: "San Juan, Puerto Rico",       lat: 18.4655, lon: -66.1057, color: "#7b1fa2", note: "Transshipment hub for TOTE (Jax) and Crowley (Houston/PE) services. NOT a mandatory stop — Tropical's Palm Beach → St. Croix is direct." },
  { name: "Wilfred 'Bomba' Allick Port (Krause Lagoon, St. Croix)", lat: 17.7025, lon: -64.7500, color: "#d32f2f", note: "USVI's main container terminal, south shore Krause Lagoon. 45-acre facility, 1,000 ft dock, 30 ft draft, 30-ton gantry crane, RoRo+LoLo. Gallows Bay (north shore) closed since Hurricane Maria 2017. ~10 mi trucking to JFL via Melvin H. Evans Hwy / Centerline Rd." }
];

// ---- Suffolk JFL project destination ----
const jfl = {
  name: "Governor Juan F. Luis Hospital (JFL)",
  lat: 17.7459, lon: -64.7028,
  address: "4007 Estate Diamond Ruby, Christiansted, St. Croix, USVI 00821",
  scope: "Demolition + new ~482,000 sq ft hospital rebuild",
  contract: "Suffolk Construction — Phase 1 cap ~$142M (preconstruction $3.43M + early works $138.9M); total ~$1B (~$834M FEMA)",
  timeline: "Preconstruction ~12 mo; demolition before 2027; ~5-year construction",
  portLat: 17.7025, portLon: -64.7500,
  source: "https://stthomassource.com/content/2026/03/26/gvi-inks-luis-hospital-demolition-rebuild-contract/"
};

// ---- Feasibility colors ----
const feasColor = { "HIGH": "#2e7d32", "MED-HIGH": "#689f38", "MED": "#f9a825", "MED-LOW": "#ef6c00", "LOW": "#c62828" };

// ---- Map setup ----
const map = L.map('map').setView([27, -75], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 18
}).addTo(map);

// ---- Plot factories with trade-category icons ----
factories.forEach(f => {
  const color = feasColor[f.feas] || "#555";
  const iconClass = tradeIcon[f.category] || "fa-solid fa-industry";
  const icon = L.divIcon({
    className: 'factory-icon',
    html: `<div class="trade-marker" style="background:${color}"><i class="${iconClass}"></i></div>`,
    iconSize: [38, 38],
    iconAnchor: [19, 19]
  });
  const marker = L.marker([f.lat, f.lon], { icon }).addTo(map);

  const gmapsURL = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(f.address)}&destination=${encodeURIComponent("Port of " + f.port)}&travelmode=driving`;

  marker.bindPopup(`
    <div class="popup">
      <h3><i class="${iconClass}" style="color:${color};margin-right:6px"></i>${f.name}</h3>
      <div class="meta"><b>Category:</b> ${f.category} (HIGH priority trade)</div>
      <div class="meta"><b>Address:</b> ${f.address}</div>
      <div class="meta"><b>Assigned port:</b> ${f.port}</div>
      <div class="meta"><span class="feas" style="background:${color}">${f.feas}</span></div>
      <div style="margin-top:6px"><a href="${gmapsURL}" target="_blank">▶ Driving route on Google Maps</a></div>
      <div><a href="${f.source}" target="_blank">▶ Source</a></div>
    </div>
  `);

  // Driving leg: factory → its assigned port
  L.polyline([[f.lat, f.lon], [f.portLat, f.portLon]], {
    color: color, weight: 2, opacity: 0.55
  }).addTo(map);
});

// ---- Plot ports ----
ports.forEach(p => {
  const marker = L.marker([p.lat, p.lon], {
    icon: L.divIcon({
      className: 'port-icon',
      html: `<div style="background:${p.color};color:white;padding:4px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.3)">⚓ ${p.name}</div>`,
      iconSize: null, iconAnchor: [0, 0]
    })
  }).addTo(map);
  marker.bindPopup(`<div class="popup"><h3>⚓ ${p.name}</h3><div class="meta">${p.note}</div></div>`);
});

// ---- Plot JFL destination (star marker) ----
const jflStarIcon = L.divIcon({
  className: 'destination-icon',
  html: `<div style="background:#b71c1c;color:#fff;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:800;white-space:nowrap;box-shadow:0 3px 8px rgba(0,0,0,.5);border:3px solid #fff">★ JFL Hospital — Suffolk site</div>`,
  iconSize: null, iconAnchor: [0, 0]
});
const gmapsJFL = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent("Krause Lagoon, St. Croix")}&destination=${encodeURIComponent(jfl.address)}&travelmode=driving`;
L.marker([jfl.lat, jfl.lon], { icon: jflStarIcon }).addTo(map)
  .bindPopup(`
    <div class="popup">
      <h3>★ ${jfl.name}</h3>
      <div class="meta"><b>Address:</b> ${jfl.address}</div>
      <div class="meta"><b>Scope:</b> ${jfl.scope}</div>
      <div class="meta"><b>Contract:</b> ${jfl.contract}</div>
      <div class="meta"><b>Timeline:</b> ${jfl.timeline}</div>
      <div class="meta"><b>Inbound seaport:</b> Wilfred 'Bomba' Allick Port at Krause Lagoon, St. Croix (~10 mi via Melvin H. Evans Hwy / Centerline Rd)</div>
      <div style="margin-top:6px"><a href="${gmapsJFL}" target="_blank">▶ Wilfred Allick Port → JFL driving route</a></div>
      <div><a href="${jfl.source}" target="_blank">▶ Source</a></div>
    </div>
  `);
// Final-mile leg: Wilfred Allick Port → JFL (~10 mi)
L.polyline([[jfl.portLat, jfl.portLon], [jfl.lat, jfl.lon]], {
  color: "#b71c1c", weight: 3, opacity: 0.9
}).addTo(map);

// ---- Ocean routes ----
// Tropical (Palm Beach) is DIRECT to STX, bypassing SJU — Jones Act exemption makes foreign-flag legal
// TOTE (Jax) and Crowley (Houston) both transship via SJU
const oceanRoutes = [
  { from: [26.7683, -80.0534], to: [17.7025, -64.7500], label: "Port of Palm Beach → Wilfred Allick Port, St. Croix (Tropical Shipping DIRECT, 3-day ocean, foreign-flag under USVI Jones Act exemption)", color: "#0a66c2" },
  { from: [30.3322, -81.6557], to: [18.4655, -66.1057], label: "Jacksonville → San Juan (TOTE Maritime US-flag, twice weekly, 2–3 day transit)", color: "#1976d2" },
  { from: [29.7247, -95.0114], to: [18.4655, -66.1057], label: "Houston → San Juan (Crowley Gulf-Caribbean, 5–7 day transit)", color: "#1976d2" },
  { from: [18.4655, -66.1057], to: [17.7025, -64.7500], label: "San Juan → Wilfred Allick Port, St. Croix (feeder vessel, +1–2 days; for TOTE & Crowley cargo)", color: "#b71c1c" }
];
oceanRoutes.forEach(r => {
  L.polyline([r.from, r.to], {
    color: r.color, weight: 3, opacity: 0.75, dashArray: "10, 8"
  }).addTo(map).bindTooltip(r.label, { sticky: true });
});

// ---- Legend ----
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>HIGH priority trade categories</h4>
    <div><span class="trade-icon"><i class="fa-solid fa-bath"></i></span>Bathroom Pods</div>
    <div><span class="trade-icon"><i class="fa-solid fa-plug"></i></span>MEP Racks / Risers</div>
    <div><span class="trade-icon"><i class="fa-solid fa-hospital"></i></span>Patient Headwalls</div>
    <div><span class="trade-icon"><i class="fa-solid fa-layer-group"></i></span>OR / Clean Room Ceilings</div>
    <hr style="margin:6px 0">
    <h4>Feasibility (circle color)</h4>
    <div><span class="sw" style="background:#2e7d32"></span>HIGH — near Jacksonville</div>
    <div><span class="sw" style="background:#689f38"></span>MED-HIGH — SE / Atlanta belt</div>
    <div><span class="sw" style="background:#f9a825"></span>MED — long inland haul</div>
    <div><span class="sw" style="background:#ef6c00"></span>MED-LOW — West Coast / SW</div>
    <div><span class="sw" style="background:#c62828"></span>LOW — cross-border Canada</div>
    <hr style="margin:6px 0">
    <div><span class="line"></span>Trucking leg (factory → US port)</div>
    <div><span class="line dashed" style="border-top-color:#0a66c2"></span>Palm Beach → STX DIRECT (Tropical, 3 d)</div>
    <div><span class="line dashed" style="border-top-color:#1976d2"></span>Jax/Houston → San Juan (TOTE/Crowley)</div>
    <div><span class="line dashed" style="border-top-color:#b71c1c"></span>SJU → Wilfred Allick Port (feeder)</div>
    <hr style="margin:6px 0">
    <div><span style="color:#b71c1c;font-weight:700">★</span> <b>JFL Hospital</b> — Suffolk final destination</div>
  `;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
